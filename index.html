  <script>
    // Request the largest available Telegram Mini App viewport before Flutter
    // starts. iOS can lock the first layout pass to a half-height sheet if this
    // waits until the Dart bundle is loaded.
    (function () {
      'use strict';

      function hasTelegramVersion(webApp, version) {
        try {
          return typeof webApp.isVersionAtLeast === 'function' &&
            webApp.isVersionAtLeast(version) === true;
        } catch (_) {
          return false;
        }
      }

      function isMobileTelegramWebApp(webApp) {
        try {
          var platform = String(webApp && webApp.platform || '').toLowerCase();
          if (platform === 'ios' || platform === 'android' || platform === 'android_x') {
            return true;
          }
          if (platform === 'tdesktop' || platform === 'weba' || platform === 'webk' ||
              platform === 'macos' || platform === 'windows' || platform === 'linux') {
            return false;
          }
        } catch (_) {}
        try {
          var ua = String(navigator.userAgent || '');
          if (/Android|iPhone|iPad|iPod|Mobile/i.test(ua)) return true;
        } catch (_) {}
        try {
          return window.matchMedia &&
            window.matchMedia('(pointer: coarse) and (max-width: 900px)').matches;
        } catch (_) {
          return false;
        }
      }

      function requestViewport(reason) {
        try {
          var webApp = window.Telegram && window.Telegram.WebApp;
          if (!webApp) return;
          if (typeof webApp.ready === 'function') webApp.ready();
          if (typeof webApp.expand === 'function') webApp.expand();
          if (typeof webApp.disableVerticalSwipes === 'function') {
            webApp.disableVerticalSwipes();
          }
          if (isMobileTelegramWebApp(webApp) &&
              hasTelegramVersion(webApp, '8.0') &&
              typeof webApp.requestFullscreen === 'function') {
            webApp.requestFullscreen();
          }
          window.__agoraTelegramViewportRequested = reason;
        } catch (_) {}
      }

      requestViewport('index-startup');
      setTimeout(function () { requestViewport('index-retry-250ms'); }, 250);
      setTimeout(function () { requestViewport('index-retry-900ms'); }, 900);
    })();
  </script>

      var MIN_BACK_SWIPE_PX = 48;
      var HORIZONTAL_RATIO = 1.35;

      function canGoBack() {

      }

        if (!canGoBack() || event.touches.length !== 1) return;

        var touch = event.touches[0];
        if (touch.clientX > EDGE_WIDTH_PX) return;

          startX: touch.clientX,
          startY: touch.clientY,
          lastX: touch.clientX,
          lastY: touch.clientY

        if (!tracking || event.touches.length !== 1) return;

        var touch = event.touches[0];
        var dx = touch.clientX - tracking.startX;
        var dy = Math.abs(touch.clientY - tracking.startY);

        tracking.lastX = touch.clientX;
        tracking.lastY = touch.clientY;

        if (dx > 8 && dx > dy) {
          suppressingNativeSwipe = true;
          stopNativeSwipe(event);

      }, { capture: true, passive: false });

      document.addEventListener('touchend', function (event) {

        var dx = tracking.lastX - tracking.startX;

          language: boundedString(readSignal(function () { return navigator.language; }), 64),

          return new Promise(function (resolve, reject) {

    (function() {
      var versionMeta = document.querySelector('meta[name="version"]');
      var currentVersion = versionMeta ? versionMeta.getAttribute('content') : '';
      var versionKey = 'agora_web_bootstrap_version';

      function loadFlutterBootstrap() {
        var script = document.createElement('script');
        script.src = "flutter_bootstrap.1.0.1907.js";
        script.async = true;
        document.body.appendChild(script);
      }

      async function resetStaleRuntimeCache() {
        if (!currentVersion || !window.localStorage) return;
        var previousVersion = localStorage.getItem(versionKey);
        if (previousVersion === currentVersion) return;

        if (navigator.serviceWorker) {
          var registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map(function(registration) {
            return registration.unregister();
          }));
        }

        if (window.caches) {
          var cacheNames = await caches.keys();
          await Promise.all(cacheNames.map(function(cacheName) {
            return caches.delete(cacheName);
          }));
        }

        localStorage.setItem(versionKey, currentVersion);
      }

      resetStaleRuntimeCache()
        .catch(function(error) {
          console.warn(
            '[BOOTSTRAP_CACHE_RESET] errorType=' +
            ((error && error.name) || 'UnknownError')
          );
        })
        .then(loadFlutterBootstrap);
    })();
