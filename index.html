  <script>
    (function () {
      'use strict';

      function isIOSStandaloneStartup() {
        try {
          var ua = navigator.userAgent || '';
          var maxTouchPoints = Number(navigator.maxTouchPoints || 0);
          var isIOS = /iPad|iPhone|iPod/.test(ua) ||
            (/Macintosh/.test(ua) && maxTouchPoints > 1);
          if (!isIOS) return false;
          return window.matchMedia('(display-mode: standalone)').matches ||
            window.matchMedia('(display-mode: fullscreen)').matches ||
            window.matchMedia('(display-mode: minimal-ui)').matches ||
            window.navigator.standalone === true;
        } catch (_) {
          return false;
        }
      }

      function revealStartupLoading(reason) {
        var root = document.documentElement;
        if (!root) return;
        root.classList.add('agora-startup-layout-ready');
        root.classList.remove('agora-startup-layout-pending');
        window.__AGORA_STARTUP_REVEAL_REASON = reason || 'ready';
      }

      window.__AGORA_REVEAL_STARTUP_LOADING = revealStartupLoading;

      if (isIOSStandaloneStartup()) {
        document.documentElement.classList.add(
          'agora-ios-standalone-startup',
          'agora-startup-layout-pending'
        );
        window.__AGORA_STARTUP_REVEAL_REASON = 'pending';
        setTimeout(function () {
          revealStartupLoading('fallback-timeout');
        }, 1800);
      } else {
        revealStartupLoading('not-ios-standalone');
      }
    })();
  </script>

  <script>
    (function () {
      'use strict';

      var logs = window.__AGORA_STARTUP_LAYOUT_LOGS = window.__AGORA_STARTUP_LAYOUT_LOGS || [];

      function isStandalone() {
        try {
          return window.matchMedia('(display-mode: standalone)').matches ||
            window.matchMedia('(display-mode: fullscreen)').matches ||
            window.matchMedia('(display-mode: minimal-ui)').matches ||
            window.navigator.standalone === true;
        } catch (_) {
          return false;
        }
      }

      function elementSnapshot(label, element) {
        if (!element) return label + '=null';
        try {
          var rect = element.getBoundingClientRect();
          var style = window.getComputedStyle(element);
          return label +
            ' rect=(' + rect.left.toFixed(1) + ',' + rect.top.toFixed(1) + ',' +
            rect.width.toFixed(1) + 'x' + rect.height.toFixed(1) + ')' +
            ' display=' + style.display +
            ' visibility=' + style.visibility +
            ' opacity=' + style.opacity +
            ' background=' + style.backgroundColor +
            ' position=' + style.position +
            ' top=' + style.top +
            ' height=' + style.height +
            ' transform=' + style.transform;
        } catch (e) {
          return label + ' snapshot failed: ' + e.message;
        }
      }

      function snapshot(label) {
        try {
          var vv = window.visualViewport;
          var parts = [
            label,
            't=' + Math.round(performance.now()),
            'htmlClasses=' + ((document.documentElement && document.documentElement.className) || ''),
            'classes=' + ((document.body && document.body.className) || ''),
            'startupReveal=' + (window.__AGORA_STARTUP_REVEAL_REASON || 'unset'),
            'standalone=' + isStandalone(),
            'inner=' + window.innerWidth + 'x' + window.innerHeight,
            'screen=' + window.screen.width + 'x' + window.screen.height,
            'dpr=' + window.devicePixelRatio
          ];
          if (vv) {
            parts.push('vv=' + vv.width + 'x' + vv.height +
              ' offset=(' + vv.offsetLeft + ',' + vv.offsetTop + ')' +
              ' scale=' + vv.scale);
          } else {
            parts.push('vv=null');
          }
          parts.push(elementSnapshot('html', document.documentElement));
          parts.push(elementSnapshot('body', document.body));
          parts.push(elementSnapshot('loading', document.getElementById('loading-screen')));
          parts.push(elementSnapshot('flutterRoot', document.getElementById('flutter-root')));
          logs.push(parts.join(' | '));
          if (logs.length > 40) logs.shift();
        } catch (e) {
          logs.push(label + ' failed: ' + e.message);
        }
      }

      snapshot('inline');
      (window.requestAnimationFrame || function (cb) { return setTimeout(cb, 16); })(function () {
        snapshot('raf1');
        (window.requestAnimationFrame || function (cb) { return setTimeout(cb, 16); })(function () {
          snapshot('raf2');
        });
      });
      setTimeout(function () { snapshot('t60'); }, 60);
      setTimeout(function () { snapshot('t250'); }, 250);
      setTimeout(function () { snapshot('t800'); }, 800);
      setTimeout(function () { snapshot('t1500'); }, 1500);
      setTimeout(function () { snapshot('t3000'); }, 3000);
    })();
  </script>

      var maxTouchPoints = Number(navigator.maxTouchPoints || 0);

        isStandalone = window.matchMedia('(display-mode: standalone)').matches ||
          window.navigator.standalone === true ||
          window.matchMedia('(display-mode: fullscreen)').matches;
      } catch (_) {
        isStandalone = false;
      }

      if (!isIOS || !isStandalone) return;

      window.__AGORA_IOS_EDGE_BACK_GUARD_INSTALLED = true;

      var EDGE_WIDTH_PX = 28;
      var MIN_BACK_SWIPE_PX = 48;
      var HORIZONTAL_RATIO = 1.35;
      var tracking = null;
      var suppressingNativeSwipe = false;

      function canGoBack() {
        return window.history && window.history.length > 1;
      }

      function resetTracking() {
        tracking = null;
        suppressingNativeSwipe = false;
      }

      function stopNativeSwipe(event) {
        try {
          event.preventDefault();
          event.stopPropagation();
        } catch (_) {}
      }

      document.addEventListener('touchstart', function (event) {
        if (!canGoBack() || event.touches.length !== 1) return;

        var touch = event.touches[0];
        if (touch.clientX > EDGE_WIDTH_PX) return;

        tracking = {
          startX: touch.clientX,
          startY: touch.clientY,
          lastX: touch.clientX,
          lastY: touch.clientY
        };
        suppressingNativeSwipe = true;
        stopNativeSwipe(event);
      }, { capture: true, passive: false });

      document.addEventListener('touchmove', function (event) {
        if (!tracking || event.touches.length !== 1) return;

        var touch = event.touches[0];
        var dx = touch.clientX - tracking.startX;
        var dy = Math.abs(touch.clientY - tracking.startY);

        tracking.lastX = touch.clientX;
        tracking.lastY = touch.clientY;

        if (dx > 8 && dx > dy) {
          suppressingNativeSwipe = true;
          stopNativeSwipe(event);
        }
      }, { capture: true, passive: false });

      document.addEventListener('touchend', function (event) {
        if (!tracking) return;

        var dx = tracking.lastX - tracking.startX;
        var dy = Math.abs(tracking.lastY - tracking.startY);
        var shouldGoBack = suppressingNativeSwipe &&

          dx > dy * HORIZONTAL_RATIO;

          window.setTimeout(function () {

        if (!currentVersion || !window.localStorage) return;
        var previousVersion = localStorage.getItem(versionKey);
        if (previousVersion === currentVersion) return;

        if (navigator.serviceWorker) {
          var registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map(function(registration) {
            return registration.unregister();
          }));

        if (window.caches) {
          var cacheNames = await caches.keys();
          await Promise.all(cacheNames.map(function(cacheName) {
            return caches.delete(cacheName);
          }));
        }

        localStorage.setItem(versionKey, currentVersion);
      }

      resetStaleRuntimeCache()
        .catch(function(error) {
          console.warn('[BOOTSTRAP_CACHE_RESET]', error);
        })
        .then(loadFlutterBootstrap);
