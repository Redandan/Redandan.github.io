  let _hostSpinResult = null;

  if (_isFlutterMode && hasFlutterCallHandler()) {
    // ── Flutter native entry: use inappwebview JS bridge (SDK-backed in Dart) ──
    addLog(`SPIN(bridge) → ${_spinMode} bet=${betIdx}`, 'info');
    const bridgeResult = await callFlutterHandler('spin', {
      betIndex: betIdx,
      betAmount: currentBet(),
      mode: _spinMode,
      clientSeed: generateClientSeed(),
      nonce: Date.now().toString(),
      ...(_spinMode !== 'DEMO' ? { clientRoundId: generateClientSeed() } : {}),
    });

    const bridgePayload = bridgeResult && bridgeResult.data != null ? bridgeResult.data : null;
    if (bridgePayload && Array.isArray(bridgePayload.symbols) && bridgePayload.symbols.length > 0) {
      _hostSpinResult = {
        symbols: bridgePayload.symbols,
        symbolIds: Array.isArray(bridgePayload.symbolIds)
          ? bridgePayload.symbolIds.map(v => Number(v))
          : null,
        multiplier: bridgePayload.multiplier,
        // Accept both winAmount (backend) and prize (legacy host payload).
        prize: Number(bridgePayload.winAmount ?? bridgePayload.prize ?? 0),
        // Backend returns balance as USDT float (e.g. 1974.80).
        newBalance: Number(bridgePayload.balance ?? bridgePayload.newBalance ?? NaN),
        mode: bridgePayload.mode || _spinMode,
      };
      addLog(`SPIN(bridge) OK: ${JSON.stringify(bridgePayload.symbols)} ×${bridgePayload.multiplier}`, 'info');
    } else if (bridgeResult && bridgeResult.success === false) {
      addLog(`SPIN(bridge) failed: ${bridgeResult.message || 'unknown error'}`, 'error');
    }
  } else {
    // ── Flutter Web entry (including Telegram): use postMessage ──
    // On Flutter Web (desktop iframe or mobile direct navigation), the Dart side
    // listens for SPIN_REQUEST and replies with SPIN_RESULT / SPIN_ERROR.
    // Telegram Mini App also uses Flutter Web after auto-login in main.dart.
    const rawSpinResult = await new Promise((resolve) => {
      let settled = false;
      function onMsg(e) {
        if (e.origin !== window.__gameOrigin) return;
        if (e.source !== window.parent && e.source !== window && e.source !== null) return;
        const d = e.data || {};
        if (d.type !== 'SPIN_RESULT' && d.type !== 'SPIN_ERROR') return;
        if (settled) return;
        settled = true;
        window.removeEventListener('message', onMsg);
        clearTimeout(tOut);
        resolve(d.type === 'SPIN_RESULT' ? d : null);
      }
      window.addEventListener('message', onMsg);
      const tOut = setTimeout(() => {
        if (settled) return;
        settled = true;
        window.removeEventListener('message', onMsg);
        addLog('SPIN_REQUEST timed out – spin cancelled', 'warn');
        resolve(null);
      }, SPIN_REQUEST_TIMEOUT_MS);
      window.parent.postMessage({
        type: 'SPIN_REQUEST',
        betIndex: betIdx,
        betAmount: currentBet(),
        mode: _spinMode,
      }, window.__gameOrigin);
    });

    if (rawSpinResult) {
      _hostSpinResult = {
        symbols: Array.isArray(rawSpinResult.symbols) ? rawSpinResult.symbols : null,
        symbolIds: Array.isArray(rawSpinResult.symbolIds)
          ? rawSpinResult.symbolIds.map(v => Number(v))
          : null,
        multiplier: Number(rawSpinResult.multiplier ?? 0),
        // Support both formats: { winAmount } from backend and { prize } from legacy host.
        prize: Number(rawSpinResult.winAmount ?? rawSpinResult.prize ?? 0),
        newBalance: Number(rawSpinResult.newBalance ?? rawSpinResult.balance ?? NaN),
        mode: rawSpinResult.mode || _spinMode,
      };
    }
  }

  // Backend must return a valid SPIN_RESULT; no client-side fallback.
  if (!(_hostSpinResult?.symbolIds?.length || _hostSpinResult?.symbols?.length)) {
    addLog('旋轉請求失敗：後端無法回應，請稍後再試', 'error');
    winEl.textContent = '請求失敗';
    isSpinning  = false;
    spinBtn.disabled = false;
    if (autoSpin) { autoSpin = false; spinBtn.style.outline = ''; }
    return;
  }

  // Apply symbols and host-managed balance from backend result.
  const forcedSyms = Array.isArray(_hostSpinResult.symbols) ? _hostSpinResult.symbols : null;
  const forcedSymbolIds = Array.isArray(_hostSpinResult.symbolIds)
    ? _hostSpinResult.symbolIds.map(v => Number(v))
    : (forcedSyms ? forcedSyms.map(_resolveSymIdx) : null);
  if (typeof _hostSpinResult.newBalance === 'number') {
    // applyBalance() converts USDT float → internal ×100 units and updates the display.
    applyBalance(_hostSpinResult.newBalance);
  }

  // Launch all reels with gradual acceleration (start at 10% speed, ramp up over ~20 frames)
  reelGroups.forEach(g => { g.userData.spinning = true; g.userData.speed = MAX_SPIN_SPEED * 0.1; });
  document.getElementById('reel-canvas-wrap').classList.add('reel-spinning');

  // Stop reels staggered (600 / 1050 / 1500 ms)
  const stopDelays = [600, 1050, 1500];
  stopDelays.forEach((delay, i) => {
    setTimeout(() => {
      const strip = reelGroups[i];
      strip.userData.spinning = false;
      // Snap: find the card to land on the payline (y=0).
      // Steer to the backend-determined symbol so the visual result matches the API outcome.
      let closest = null;
      if (forcedSymbolIds !== null) {
        const targetIdx = Number(forcedSymbolIds[i]);
        if (targetIdx >= 0) {
          let minDist = Infinity;
          strip.children.forEach(card => {
            if (card.userData.symIdx === targetIdx) {
              const d = Math.abs(card.position.y);
              if (d < minDist) { minDist = d; closest = card; }
            }
          });
        }
      }
      // Safety: if the target symbol isn't present on this reel, snap to the geometrically-closest card.
      if (closest === null) {
        let minDist = Infinity;
        strip.children.forEach(card => {
          const d = Math.abs(card.position.y);
          if (d < minDist) { minDist = d; closest = card; }
        });
      }
      const snapShift = -closest.position.y;
      strip.children.forEach(card => { card.position.y += snapShift; });
      strip.userData.speed = 0;
      // Remove motion blur when the last reel stops
      if (i === stopDelays.length - 1) {
        document.getElementById('reel-canvas-wrap').classList.remove('reel-spinning');
      }
    }, delay);
  });

  // Resolve spin — all 3 reel stop timeouts (600 / 1050 / 1500 ms) have fired by now.
  setTimeout(() => {
    isSpinning = false;
    spinBtn.disabled = false;

    const multiplier = _hostSpinResult.multiplier ?? 0;
    const displaySymbols = (forcedSymbolIds || []).map(idx => {
      const n = Number(idx);
      return Number.isFinite(n)
        ? (spriteMap[n]?.name?.toUpperCase() ?? `SYM${n}`)
        : 'SYM?';
    });
    addLog(`花色: ${displaySymbols.join(' ')} → ×${multiplier}`, multiplier >= 10 ? 'info' : 'warn');

    if (multiplier > 0) {
      const prize = Number(_hostSpinResult.prize ?? 0);
      if (!prize) addLog(`後端 multiplier=${multiplier} 但 winAmount 未返回`, 'warn');
      // Balance is managed by the host via SPIN_RESULT.newBalance; no local update needed.
      winEl.textContent     = '+USDT ' + prize.toFixed(2);

      // Flash reel section border — remove first to restart animation if already playing
      const rs = document.getElementById('reel-section');
      rs.classList.remove('reel-win');
      void rs.offsetHeight; // force reflow so the removal takes effect before re-adding
      rs.classList.add('reel-win');
      rs.addEventListener('animationend', () => rs.classList.remove('reel-win'), { once: true });

      // Play character dance animation on win
      if (charAction) { charAnimating = true; charAction.reset().play(); }

      // Mobile haptic
      if (navigator.vibrate) navigator.vibrate([80, 40, 160]);

      // Win announcement overlay + coin rain for all wins
      const winTitle = multiplier >= 20 ? 'BIG WIN!' : multiplier >= 10 ? 'NICE WIN!' : 'WIN!';
      showBigWin(prize, winTitle);
    }

    // Continue auto-spin: wait for any win overlay to dismiss first
    const overlayMs = multiplier >= 20 ? BIG_WIN_DISPLAY_MS : multiplier >= 3 ? WIN_DISPLAY_MS : 0;
    if (autoSpin) autoTimer = setTimeout(doSpin, overlayMs > 0 ? overlayMs : AUTO_SPIN_INTERVAL);
  }, 2000);
}

// ===== Back button – cancel auto-spin =====
/** Cancels auto-spin if it is currently active.
 *  Returns true if auto-spin was running (and has now been cancelled),
 *  false if nothing needed to be done.
 */
function cancelAutoSpin() {
  if (!autoSpin) return false;
  autoSpin = false;
  spinBtn.style.outline = '';
  clearTimeout(autoTimer);
  addLog('自動旋轉已取消', 'info');
  return true;
}

document.getElementById('btn-back').addEventListener('click', () => {
  if (!cancelAutoSpin()) {
    if (window._flutterBridge) {
      // Flutter entry (native WebView, Flutter Web iframe, or standalone mobile browser):
      // use the platform-aware bridge for back-navigation.
      window._flutterBridge.goBack();
    } else {
      // Telegram Mini App entry: ask the TG host page to close the iframe.
      window.parent.postMessage({ type: 'GO_BACK' }, window.__gameOrigin);
    }
  }
});

// ===== Big Win display =====
function spawnCoinRain() {
  const coinSyms = ['sym-diamond', 'sym-star', 'sym-sparkle', 'sym-moon', 'sym-diamond'];
  for (let i = 0; i < 22; i++) {
    const c    = document.createElement('span');
    const size = Math.round(16 + Math.random() * 18);
    const id   = coinSyms[Math.floor(Math.random() * coinSyms.length)];
    c.innerHTML = `<svg viewBox="0 0 100 100" width="${size}" height="${size}" fill="rgba(200,190,255,0.85)" aria-hidden="true"><use href="#${id}"/></svg>`;
    c.style.cssText =
      `position:fixed;pointer-events:none;z-index:495;display:inline-block;` +
      `left:${Math.random() * 100}%;top:-32px;` +
      `animation:coinFall ${1.3 + Math.random() * 1.8}s ${Math.random() * 0.9}s ease-in forwards`;
    document.body.appendChild(c);
    c.addEventListener('animationend', () => c.remove(), { once: true });
  }
}

function showBigWin(amount, title = 'BIG WIN!') {
  const bw  = document.getElementById('big-win');
  // Guard against reentrancy: if overlay is already showing, skip to avoid
  // orphaned setTimeout closures from concurrent calls fighting over the same element.
  if (!bw.classList.contains('hidden')) return;
  const bwT = document.getElementById('bw-title');
  const bwA = document.getElementById('bw-amount');
  bwT.textContent = title;
  bwA.textContent = '+USDT ' + Number(amount).toFixed(2);
  bw.classList.remove('hidden');
  bwT.style.animation = bwA.style.animation = 'none';
  void bw.offsetHeight; // 強制 reflow 以重置 CSS animation 狀態，使動畫可以重新播放 (reading offsetHeight triggers synchronous layout)
  bwT.style.animation = bwA.style.animation = '';
  spawnCoinRain();
  // Big wins stay longer; regular wins use a shorter display time
  const stayMs = title === 'BIG WIN!' ? 2300 : 1200;
  setTimeout(() => {
    bw.style.opacity = '0';
    bw.style.transition = 'opacity 0.9s';
    setTimeout(() => { bw.classList.add('hidden'); bw.style.opacity = ''; bw.style.transition = ''; }, 900);
  }, stayMs);
}

// ===== Resize handler =====
window.addEventListener('resize', () => {
  const nW = reelSection.clientWidth;
  const nH = 340; // canvas render height is fixed; section is 198px with overflow:hidden
  camera.aspect = nW / nH;
  camera.updateProjectionMatrix();
  renderer.setSize(nW, nH);
  // Recompute pixel ratio: viewport scale may have changed on resize.
  renderer.setPixelRatio(calcDPR());
  // Recompute reel geometry so cards still fill the (re-sized) frustum exactly
  const geo = computeReelGeometry(nW, nH);
  // Guard: only rebuild card geometries when dimensions actually changed
  if (Math.abs(geo.CARD_W - CARD_W) < 1e-4) return;
  CARD_W = geo.CARD_W; CARD_H = geo.CARD_H; REEL_X = geo.REEL_X;
  STRIP_CLIP = (Math.floor(N_STRIP / 2) + 1) * CARD_H;
  reelGroups.forEach((strip, ri) => {
    strip.position.x = REEL_X[ri];
    strip.children.forEach((card, i) => {
      card.geometry.dispose();
      card.geometry = new THREE.PlaneGeometry(CARD_W, CARD_H);
      card.position.y = (i - Math.floor(N_STRIP / 2)) * CARD_H;
    });
  });
  // Resize character renderer to match new center-stage dimensions
  const cW = charWrap.clientWidth  || nW;
  const cH = charWrap.clientHeight || nH;
  charCamera.aspect = cW / cH;
  charCamera.updateProjectionMatrix();
  charRenderer.setSize(cW, cH);
  charRenderer.setPixelRatio(calcDPR());
});

// ===== Animation loop =====
const animationLoopManager = createAnimationLoopManager({
  renderer,
  scene,
  camera,
  reelGroups,
  fillLight,
  maxSpinSpeed: MAX_SPIN_SPEED,
  minSpinSpeed: MIN_SPIN_SPEED,
  getStripClip: () => STRIP_CLIP,
  getCardHeight: () => CARD_H,
  isMobile: IS_MOBILE,
  orbitLightA,
  orbitLightB,
  charRenderer,
  charScene,
  charCamera,
  charSpot,
  isCharAnimating: () => charAnimating,
  getCharMixer: () => charMixer,
});
animationLoopManager.start();

console.log('月光舞台 v3.0 已加載 – WebGL2 模式');
