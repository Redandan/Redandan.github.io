<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>AgoraMarket</title>
  <style>
    html, body {
      margin: 0; width: 100%; height: 100%;
      background: #050218;
      display: flex; align-items: center; justify-content: center;
    }
    p { color: #c0ccff; font-family: Arial, sans-serif; font-size: 14px; }
  </style>
</head>
<body>
  <p id="status">載入中...</p>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    (function () {
      var statusEl = document.getElementById('status');
      function setStatus(t) { if (statusEl) statusEl.textContent = t; }

      function resolveGameId() {
        var game = new URLSearchParams(window.location.search).get('game');
        return game && game.trim() ? game.trim() : 'moon_dance';
      }

      var tg = window.Telegram && window.Telegram.WebApp;
      if (!tg) { setStatus('請在 Telegram 中開啟'); return; }
      tg.ready();
      tg.expand();

      var initData = String(tg.initData || '').trim();
      if (!initData) { setStatus('無法取得 Telegram 身分資訊'); return; }

      try {
        var gameId = resolveGameId();
        setStatus('進入遊戲中...');
        window.location.replace('/#/games/' + encodeURIComponent(gameId));
      } catch (err) {
        console.error('[tg/slot] error:', err);
        setStatus('載入錯誤，請重試');
      }
    })();
  </script>
</body>
</html>
