<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="dark" />
  <title>AgoraMarket</title>
  <style>html,body{margin:0;background:#050218;}</style>
</head>
<body>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
  (function () {
    'use strict';
    var tg        = window.Telegram && window.Telegram.WebApp;
    var hasBridge = !!(window.flutter_inappwebview &&
      typeof window.flutter_inappwebview.callHandler === 'function');

    if (!tg && !hasBridge) {
      console.error('[tg/slot] neither Telegram.WebApp nor Flutter bridge available');
      return;
    }

    if (tg) { tg.ready(); tg.expand(); }

    var game = (new URLSearchParams(window.location.search).get('game') || 'moon_dance')
      .replace(/[^a-z0-9_]/g, '');

    if (game !== 'moon_dance') {
      console.error('[tg/slot] unknown game:', game);
      return;
    }

    window.location.replace('/games/slot_game_' + game + '.html?tg=1&_ts=' + Date.now());
  })();
  </script>
</body>
</html>
