<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
<meta http-equiv="Cache-Control" content="no-cache" />
<title>AgoraMarket Slot</title>
<!-- Telegram WebApp SDK -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#010010; overflow:hidden; font-family:Arial,sans-serif; }

/* Loading screen */
#loading {
  position:fixed; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; background:#010010; z-index:100;
  color:#c0ccff; gap:16px;
}
#loading-spinner {
  width:48px; height:48px; border:4px solid rgba(192,204,255,.2);
  border-top-color:#8866ff; border-radius:50%;
  animation:spin .9s linear infinite;
}
#loading-msg { font-size:14px; opacity:.7; text-align:center; padding:0 24px; }
@keyframes spin { to { transform:rotate(360deg); } }

/* Game iframe – fills the full viewport */
#game-frame {
  position:fixed; inset:0; width:100%; height:100%;
  border:none; display:none; background:#010010;
}
</style>
</head>
<body>

<div id="loading">
  <div id="loading-spinner"></div>
  <div id="loading-msg">正在驗證身份…</div>
</div>

<iframe id="game-frame" title="AgoraMarket Slot Game" allow="autoplay; fullscreen"></iframe>

<script>
'use strict';

// ─── Configuration ────────────────────────────────────────────────────────────
const AGORA_API_BASE_URL = (
  window.__AGORA_API_BASE_URL ||
  'https://agoramarketapi.purrtechllc.com/api'
).replace(/\/$/, '');

// The game is hosted on the same origin – derive it dynamically so this file
// works both on GitHub Pages (https://redandan.github.io) and in local dev.
const GAME_ORIGIN = window.location.origin;

// Minimum bet in USDT; below this balance the user enters demo mode.
const MIN_BET_USDT = 0.25;

// Supported game slug → relative path from origin root
const GAME_ROUTES = {
  moon_dance: '/games/slot_game_moon_dance.html',
};

// ─── Helpers ──────────────────────────────────────────────────────────────────
const loadingMsg = document.getElementById('loading-msg');
const loadingEl  = document.getElementById('loading');
const gameFrame  = document.getElementById('game-frame');

function setMsg(text) { loadingMsg.textContent = text; }

function redirectError(reason, detail) {
  const url = new URL('../error.html', window.location.href);
  url.searchParams.set('reason', reason);
  if (detail) url.searchParams.set('detail', detail);
  window.location.replace(url.href);
}

// ─── Host state ───────────────────────────────────────────────────────────────
let _jwt         = null;
let _balance     = 0;   // USDT float
let _demoMode    = false;
let _username    = '';
let _gameReady   = false;
let _pendingInit = false; // HOST_INIT not yet sent (waiting for GAME_READY)

// ─── Telegram init ────────────────────────────────────────────────────────────
async function boot() {
  // 1. Wait for Telegram SDK
  const tg = await waitForTelegramSDK();
  if (!tg) {
    redirectError('no_telegram', 'Telegram WebApp SDK failed to load.');
    return;
  }

  // 2. Check initData
  const initData = tg.initData;
  if (!initData) {
    redirectError('no_initdata', 'Telegram initData is empty. Please open this link from the Telegram bot.');
    return;
  }

  // Store first_name for UI before JWT resolves
  _username = tg.initDataUnsafe?.user?.first_name || '';

  // 3. Configure Telegram UI
  try {
    tg.ready();
    tg.expand();
    if (typeof tg.requestFullscreen === 'function') tg.requestFullscreen();
    tg.disableVerticalSwipes?.();
    tg.setHeaderColor?.('bg_color');
  } catch (_) { /* non-critical */ }

  // 4. Exchange initData → JWT
  setMsg('正在獲取授權…');
  const authResult = await exchangeJwt(initData);
  if (!authResult) {
    redirectError('exchange_failed', 'Backend JWT exchange failed. Please try again later.');
    return;
  }
  _jwt = authResult.token;

  // Balance from JWT response (USDT float)
  const rawBalance = authResult.userInfo?.balance ?? authResult.balance ?? 0;
  _balance = Number(rawBalance) || 0;
  _demoMode = _balance < MIN_BET_USDT;

  // 5. Choose game from query param
  const params = new URLSearchParams(window.location.search);
  const gameSlug = params.get('game') || 'moon_dance';
  const gamePath = GAME_ROUTES[gameSlug];
  if (!gamePath) {
    redirectError('unknown_game', `Unknown game: ${gameSlug}`);
    return;
  }

  // 6. Load game iframe
  setMsg(_demoMode ? '餘額不足，進入試玩模式…' : '正在載入遊戲…');
  const gameUrl = new URL(gamePath, GAME_ORIGIN);
  gameUrl.searchParams.set('hosted', '1');
  gameFrame.src = gameUrl.href;

  // 7. Wait for GAME_READY then show iframe
  _pendingInit = true;
}

// ─── Telegram SDK wait ───────────────────────────────────────────────────────
function waitForTelegramSDK(maxMs = 3000) {
  return new Promise(resolve => {
    if (window.Telegram?.WebApp) { resolve(window.Telegram.WebApp); return; }
    const interval = 100;
    let elapsed = 0;
    const t = setInterval(() => {
      elapsed += interval;
      if (window.Telegram?.WebApp) { clearInterval(t); resolve(window.Telegram.WebApp); return; }
      if (elapsed >= maxMs) { clearInterval(t); resolve(null); }
    }, interval);
  });
}

// ─── JWT exchange ─────────────────────────────────────────────────────────────
async function exchangeJwt(initData) {
  try {
    const resp = await fetch(`${AGORA_API_BASE_URL}/auth/telegram-webapp/exchange-jwt`, {
      method: 'POST',
      mode: 'cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ initData }),
    });
    if (!resp.ok) {
      const errText = await resp.text().catch(() => '');
      console.error('[HOST] JWT exchange HTTP error', resp.status, errText);
      return null;
    }
    const json = await resp.json();
    const payload = json?.data ?? json;
    if (!payload?.token) {
      console.error('[HOST] JWT exchange: missing token in response', json);
      return null;
    }
    return payload;
  } catch (err) {
    console.error('[HOST] JWT exchange error:', err);
    return null;
  }
}

// ─── Spin API ─────────────────────────────────────────────────────────────────
async function callSpinApi(betIndex, mode) {
  try {
    const resp = await fetch(`${AGORA_API_BASE_URL}/slot/spin`, {
      method: 'POST',
      mode: 'cors',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${_jwt}`,
      },
      body: JSON.stringify({ gameId: 'moon_dance', betIndex, mode }),
    });
    if (!resp.ok) {
      const errText = await resp.text().catch(() => '');
      console.error('[HOST] spin HTTP error', resp.status, errText);
      return null;
    }
    const json = await resp.json();
    const payload = json?.data ?? json;
    // Update host balance from response
    if (typeof payload?.balance === 'number') {
      _balance = payload.balance / 100; // units → USDT
    }
    return payload;
  } catch (err) {
    console.error('[HOST] spin error:', err);
    return null;
  }
}

// ─── postMessage bridge ───────────────────────────────────────────────────────
function sendToGame(data) {
  try {
    gameFrame.contentWindow?.postMessage(data, GAME_ORIGIN);
  } catch (e) {
    console.error('[HOST] postMessage to game failed:', e);
  }
}

function sendHostInit() {
  sendToGame({
    type: 'HOST_INIT',
    jwt: _jwt,
    balance: _balance,
    demoMode: _demoMode,
    username: _username,
  });
}

window.addEventListener('message', async (e) => {
  // Strict origin check
  if (e.origin !== GAME_ORIGIN) return;
  // Ensure message comes from the game iframe specifically
  if (e.source !== gameFrame.contentWindow) return;

  const { type } = e.data || {};

  if (type === 'GAME_READY') {
    if (_gameReady) return; // deduplicate
    _gameReady = true;

    // Show iframe, hide loading
    loadingEl.style.display = 'none';
    gameFrame.style.display = 'block';

    if (_pendingInit) {
      sendHostInit();
      _pendingInit = false;
    }
    return;
  }

  if (type === 'SPIN_REQUEST') {
    const { betIndex, mode } = e.data;
    const spinResult = await callSpinApi(betIndex, mode);
    if (spinResult) {
      // spinResult.balance is in units (per backend contract); _balance is USDT.
      // Use backend value when present, otherwise fall back to current host balance
      // converted to units (Math.round avoids floating-point drift).
      const newBalanceUnits = typeof spinResult.balance === 'number'
        ? spinResult.balance
        : Math.round(_balance * 100);
      sendToGame({
        type: 'SPIN_RESULT',
        symbols: spinResult.symbols,
        multiplier: spinResult.multiplier ?? 0,
        prize: spinResult.prize ?? 0,
        newBalance: newBalanceUnits,
        mode: spinResult.mode ?? mode,
      });
    } else {
      // Backend API call failed — notify game so it can show an error to the user.
      sendToGame({ type: 'SPIN_ERROR', message: 'Backend spin unavailable. Please try again.' });
    }
    return;
  }

  if (type === 'GO_BACK') {
    // Telegram Mini App back: close the WebApp
    try { window.Telegram?.WebApp?.close?.(); } catch (_) {}
    return;
  }
});

// ─── Start ────────────────────────────────────────────────────────────────────
boot().catch(err => {
  console.error('[HOST] boot error:', err);
  redirectError('boot_error', String(err?.message || err));
});
</script>
</body>
</html>
