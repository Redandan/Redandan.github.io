<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>AgoraMarket</title>
  <style>
    html, body {
      margin: 0; width: 100%; min-height: 100%;
      background: #0a0a0a;
      display: flex; align-items: center; justify-content: center;
      box-sizing: border-box;
    }
    p { color: #c0ccff; font-family: Arial, sans-serif; font-size: 14px; }
    .probe-panel {
      width: min(92vw, 760px);
      max-height: 90vh;
      overflow: auto;
      padding: 18px;
      border: 1px solid #2f3a5f;
      border-radius: 8px;
      background: #101624;
      color: #e5ecff;
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
      font-family: Arial, sans-serif;
    }
    .probe-panel h1 {
      margin: 0 0 10px;
      font-size: 18px;
      font-weight: 700;
    }
    .probe-panel p {
      margin: 0 0 14px;
      color: #aebbf2;
      line-height: 1.45;
    }
    .probe-panel pre {
      margin: 0;
      padding: 12px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      border-radius: 6px;
      background: #07101f;
      color: #e8f0ff;
      font-size: 12px;
      line-height: 1.45;
    }
    .probe-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }
    .probe-actions button {
      min-height: 38px;
      border: 0;
      border-radius: 6px;
      padding: 0 14px;
      background: #4068ff;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }
    .probe-actions button.secondary {
      background: #27324d;
    }
  </style>
</head>
<body>
  <p id="status">載入中...</p>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="./tg_store_routing.js"></script>
  <script>
    (function () {
      var API_BASE = 'https://agoramarketapi.purrtechllc.com/api';
      var USDT_TELEMETRY_ENDPOINT =
        API_BASE + '/public/traffic/usdt-landing/events';
      var statusEl = document.getElementById('status');
      function setStatus(t) { if (statusEl) statusEl.textContent = t; }
      function parseQuery(value) {
        var out = {};
        if (!value) return out;
        var search = String(value);
        if (search.charAt(0) === '?') search = search.slice(1);
        if (!search) return out;
        var params = new URLSearchParams(search);
        params.forEach(function (paramValue, key) {
          out[key] = paramValue;
        });
        return out;
      }
      function eventId() {
        if (window.crypto && typeof window.crypto.randomUUID === 'function') {
          return window.crypto.randomUUID();
        }
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function (token) {
          var random = Math.floor(Math.random() * 16);
          var value = token === 'x' ? random : (random & 0x3) | 0x8;
          return value.toString(16);
        });
      }
      function postStartappReceived(event, attempt) {
        return fetch(USDT_TELEMETRY_ENDPOINT, {
          method: 'POST',
          mode: 'cors',
          credentials: 'omit',
          cache: 'no-store',
          keepalive: true,
          headers: {
            Accept: 'application/json',
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(event),
        }).then(function (response) {
          if (!response.ok) throw new Error('telemetry status ' + response.status);
          return response.json();
        }).catch(function () {
          if (attempt >= 1) return null;
          return new Promise(function (resolve) {
            setTimeout(function () {
              resolve(postStartappReceived(event, attempt + 1));
            }, 250);
          });
        });
      }
      function recordStartappReceived(routeTarget) {
        if (!routeTarget || routeTarget.probe) return Promise.resolve(null);
        var event = window.TgStoreRouting.buildStartappReceivedEvent(
          routeTarget,
          eventId()
        );
        return event ? postStartappReceived(event, 0) : Promise.resolve(null);
      }
      function readInitDataSummary(initData) {
        var params = parseQuery(initData);
        return {
          present: Boolean(initData),
          hasHash: Boolean(params.hash),
          hasUser: Boolean(params.user),
          hasAuthDate: Boolean(params.auth_date),
        };
      }
      function buildProbeEvidence(routeTarget, tg, authBody, authResult) {
        var locationParams = parseQuery(window.location.search);
        return {
          capturedAt: new Date().toISOString(),
          source: 'tg-store-ref-probe',
          location: {
            searchKeys: Object.keys(locationParams).sort(),
            startapp: locationParams.startapp || '',
            tgWebAppStartParam: locationParams.tgWebAppStartParam || '',
          },
          telegramRuntime: {
            hasWebApp: Boolean(tg),
            initDataUnsafeStartParam: String((tg.initDataUnsafe || {}).start_param || ''),
            initDataSummary: readInitDataSummary(String(tg.initData || '')),
          },
          resolvedRoute: {
            route: routeTarget.route,
            ref: routeTarget.ref,
            referrerGroupId: routeTarget.referrerGroupId,
            targetPath: routeTarget.targetPath,
            hashTarget: routeTarget.hashTarget,
          },
          authRequest: {
            endpoint: '/api/auth/telegram-webapp/exchange-jwt',
            initData: '<redacted>',
            sentReferrerGroupId: Object.prototype.hasOwnProperty.call(authBody, 'referrerGroupId'),
            referrerGroupId: authBody.referrerGroupId == null ? null : authBody.referrerGroupId,
          },
          authResponse: authResult,
        };
      }
      function hasTelegramVersion(webApp, version) {
        try {
          return typeof webApp.isVersionAtLeast === 'function' &&
            webApp.isVersionAtLeast(version) === true;
        } catch (_) {
          return false;
        }
      }
      function isMobileTelegramWebApp(webApp) {
        try {
          var platform = String(webApp && webApp.platform || '').toLowerCase();
          if (platform === 'ios' || platform === 'android' || platform === 'android_x') {
            return true;
          }
          if (platform === 'tdesktop' || platform === 'weba' || platform === 'webk' ||
              platform === 'macos' || platform === 'windows' || platform === 'linux') {
            return false;
          }
        } catch (_) {}
        try {
          var ua = String(navigator.userAgent || '');
          if (/Android|iPhone|iPad|iPod|Mobile/i.test(ua)) return true;
        } catch (_) {}
        try {
          return window.matchMedia &&
            window.matchMedia('(pointer: coarse) and (max-width: 900px)').matches;
        } catch (_) {
          return false;
        }
      }
      function requestTelegramViewport(webApp, reason) {
        try {
          if (!webApp) return;
          if (typeof webApp.ready === 'function') webApp.ready();
          if (typeof webApp.expand === 'function') webApp.expand();
          if (typeof webApp.disableVerticalSwipes === 'function') {
            webApp.disableVerticalSwipes();
          }
          if (isMobileTelegramWebApp(webApp) &&
              hasTelegramVersion(webApp, '8.0') &&
              typeof webApp.requestFullscreen === 'function') {
            webApp.requestFullscreen();
          }
          window.__agoraTelegramViewportRequested = reason;
        } catch (_) {}
      }
      function readTelegramThemeMode(webApp) {
        try {
          var colorScheme = String(webApp && webApp.colorScheme || '').trim().toLowerCase();
          if (colorScheme === 'dark' || colorScheme === 'light') return colorScheme;
        } catch (_) {}
        try {
          var params = (webApp && webApp.themeParams) || {};
          var bg = String(params.bg_color || params.secondary_bg_color || '').trim().toLowerCase();
          if (bg && /^#?[0-9a-f]{6}$/.test(bg)) {
            var hex = bg.charAt(0) === '#' ? bg.slice(1) : bg;
            var r = parseInt(hex.slice(0, 2), 16);
            var g = parseInt(hex.slice(2, 4), 16);
            var b = parseInt(hex.slice(4, 6), 16);
            var luminance = (0.2126 * r + 0.7152 * g + 0.0722 * b) / 255;
            return luminance < 0.5 ? 'dark' : 'light';
          }
        } catch (_) {}
        return '';
      }
      function showProbeEvidence(evidence, continueFn) {
        if (statusEl) statusEl.style.display = 'none';
        var panel = document.createElement('main');
        panel.className = 'probe-panel';
        var title = document.createElement('h1');
        title.textContent = 'TG Referrer Probe';
        var note = document.createElement('p');
        note.textContent = 'Sanitized runtime evidence. initData, JWT, bot tokens, and API keys are redacted.';
        var pre = document.createElement('pre');
        pre.textContent = JSON.stringify(evidence, null, 2);
        var actions = document.createElement('div');
        actions.className = 'probe-actions';
        var copy = document.createElement('button');
        copy.textContent = 'Copy Evidence';
        copy.onclick = async function () {
          try {
            await navigator.clipboard.writeText(pre.textContent);
            copy.textContent = 'Copied';
          } catch (_) {
            copy.textContent = 'Copy Failed';
          }
        };
        actions.appendChild(copy);
        if (typeof continueFn === 'function') {
          var next = document.createElement('button');
          next.className = 'secondary';
          next.textContent = 'Continue';
          next.onclick = continueFn;
          actions.appendChild(next);
        }
        panel.appendChild(title);
        panel.appendChild(note);
        panel.appendChild(pre);
        panel.appendChild(actions);
        document.body.innerHTML = '';
        document.body.appendChild(panel);
      }

      var tg = window.Telegram && window.Telegram.WebApp;
      if (!tg) { setStatus('請在 Telegram 中開啟'); return; }
      requestTelegramViewport(tg, 'tg-store-startup');
      setTimeout(function () { requestTelegramViewport(tg, 'tg-store-retry-250ms'); }, 250);
      setTimeout(function () { requestTelegramViewport(tg, 'tg-store-retry-900ms'); }, 900);

      var initData = String(tg.initData || '').trim();
      if (!initData) { setStatus('無法取得 Telegram 身分資訊'); return; }

      (async function () {
        try {
          var routeTarget = window.TgStoreRouting.resolveTarget({
            search: window.location.search,
            initDataUnsafe: tg.initDataUnsafe || {},
          });

          setStatus('驗證身分中...');
          var authBody = { initData: initData };
          if (routeTarget.referrerGroupId !== null) {
            authBody.referrerGroupId = routeTarget.referrerGroupId;
          }
          var authResult = { status: null, ok: false };
          var resp = await fetch(API_BASE + '/auth/telegram-webapp/exchange-jwt', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(authBody),
          });
          authResult.status = resp.status;
          authResult.ok = resp.ok;
          if (!resp.ok) {
            console.error('[tg/store] auth failed: endpoint=exchange-jwt status=' + resp.status);
            if (routeTarget.probe) {
              showProbeEvidence(buildProbeEvidence(routeTarget, tg, authBody, authResult), null);
              return;
            }
            setStatus('登入失敗 (' + resp.status + ')');
            return;
          }

          var json = await resp.json();
          var body = json.data != null ? json.data : json;
          var jwt = String(body.jwt || body.token || body.accessToken || '').trim();
          if (!jwt) { setStatus('登入失敗（無 token）'); return; }

          var userInfo = body.userInfo || body || {};
          var userId = String(userInfo.id || userInfo.userId || body.userId || '');
          var userRole = String(userInfo.role || body.role || 'USER').toUpperCase();
          authResult.tokenReceived = Boolean(jwt);
          authResult.responseUserIdPresent = Boolean(userId);
          authResult.role = userRole || 'USER';

          // 儲存至 localStorage，Flutter 啟動時讀取
          localStorage.setItem('_tg_store_jwt',  jwt);
          localStorage.setItem('_tg_store_uid',  userId);
          localStorage.setItem('_tg_store_role', userRole);
          localStorage.setItem('_tg_store_target_path', routeTarget.targetPath);
          var themeMode = readTelegramThemeMode(tg);
          if (themeMode) {
            localStorage.setItem('_tg_store_theme', themeMode);
          } else {
            localStorage.removeItem('_tg_store_theme');
          }
          if (routeTarget.ref) {
            localStorage.setItem('_tg_store_ref', routeTarget.ref);
          } else {
            localStorage.removeItem('_tg_store_ref');
          }

          setStatus('進入商城中...');
          var startappTelemetry = recordStartappReceived(routeTarget);
          if (routeTarget.probe) {
            showProbeEvidence(
              buildProbeEvidence(routeTarget, tg, authBody, authResult),
              function () { window.location.replace(routeTarget.hashTarget); }
            );
            return;
          }
          await Promise.race([
            startappTelemetry,
            new Promise(function (resolve) { setTimeout(resolve, 300); }),
          ]);
          window.location.replace(routeTarget.hashTarget);
        } catch (err) {
          console.error('[tg/store] error: errorType=' + ((err && err.name) || 'UnknownError'));
          setStatus('載入錯誤，請重試');
        }
      })();
    })();
  </script>
</body>
</html>
